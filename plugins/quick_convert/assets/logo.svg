<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Blue and white file conversion tool icon">
  <defs>
    <style>
      .blue{fill:#2563EB;}
      .white{fill:#FFFFFF;}
      .stroke-blue{fill:none;stroke:#2563EB;stroke-width:96;stroke-linecap:butt;stroke-linejoin:round;}
      .stroke-white{fill:none;stroke:#FFFFFF;stroke-width:54;stroke-linecap:butt;stroke-linejoin:round;}
    </style>
  </defs>

  <!-- Source document: blue sheet with white content lines -->
  <rect class="blue" x="33" y="33" width="367" height="434" rx="12"/>
  <rect class="white" x="78" y="88" width="244" height="34" rx="6"/>
  <rect class="white" x="78" y="155" width="166" height="34" rx="6"/>
  <rect class="white" x="278" y="155" width="66" height="34" rx="6"/>
  <rect class="white" x="78" y="222" width="166" height="34" rx="6"/>
  <rect class="white" x="300" y="222" width="44" height="34" rx="6"/>
  <rect class="white" x="78" y="289" width="133" height="34" rx="6"/>
  <rect class="white" x="245" y="289" width="99" height="34" rx="6"/>
  <rect class="white" x="78" y="356" width="266" height="34" rx="6"/>

  <!-- Conversion arrow: white stroke with blue outline so it works on any background -->
  <path class="stroke-blue" d="M467 50H533C590 50 617 82 617 133V240"/>
  <path class="stroke-white" d="M467 50H533C590 50 617 82 617 133V240"/>
  <polygon class="blue" points="538,147 617,226 696,147 731,182 617,296 503,182"/>
  <polygon class="white" points="557,164 617,224 677,164 704,191 617,278 530,191"/>

  <!-- Output document: blue outline/body with white page area and blue details -->
  <path class="blue" d="M433 333H680L800 453V767H433Z"/>
  <path class="white" d="M467 367H633V501H767V733H467Z"/>
  <polygon class="white" points="667,367 767,467 667,467"/>
  <polygon class="blue" points="667,333 800,466 767,500 633,367" opacity="0.92"/>
  <polygon class="white" points="681,382 752,453 681,453"/>
  <rect class="blue" x="500" y="534" width="233" height="166" rx="8"/>
  <rect class="white" x="534" y="567" width="166" height="100" rx="6"/>
  <rect class="blue" x="560" y="592" width="114" height="16" rx="4"/>
  <rect class="blue" x="560" y="627" width="86" height="16" rx="4"/>
</svg>
